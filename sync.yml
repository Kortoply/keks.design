name: Sync Telegram Portfolio

on:
  schedule:
    - cron: '0 */12 * * *' # Запуск каждые 12 часов
  workflow_dispatch: # Позволяет запустить вручную кнопкой в GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run sync script
        run: node sync-tg.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add posts.json
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: sync telegram posts"
          # Пушим через PAT, чтобы триггерить сборку GitHub Pages
          git push https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git